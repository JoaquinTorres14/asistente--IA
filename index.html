<!DOCTYPE html> 
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiCode AI - Mentor Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
</head>

<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-800 via-zinc-950 to-black text-white flex flex-col items-center justify-center min-h-screen p-4 font-sans">
    
    <div class="w-full max-w-5xl p-8 glass-card rounded-[2.5rem] shadow-2xl relative mx-4">
        
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div id="statusIcon" class="w-10 h-10 bg-gradient-to-tr from-cyan-600 to-indigo-500 rounded-full flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <span class="text-xl">🚀</span>
                </div>
                <h2 class="text-lg font-bold tracking-tighter text-white">LEXICODE <span class="text-cyan-400">V2.5</span></h2>
            </div>
            <button id="toggleVoz" class="text-[10px] px-3 py-2 rounded-xl bg-zinc-800/50 border border-zinc-700 hover:bg-zinc-700 transition font-bold uppercase tracking-widest">
                🔊 VOZ: ON
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            
            <div class="md:col-span-4 flex flex-col gap-4">
                <div class="bg-black/20 p-5 rounded-3xl border border-white/5 flex flex-col gap-4">
                    
                    <div class="flex items-center justify-between bg-zinc-900/80 p-2 rounded-xl border border-zinc-700">
                        <span class="text-[9px] text-zinc-400 uppercase font-bold ml-2 tracking-widest">Nivel de Mentor</span>
                        <div class="flex bg-zinc-800 rounded-lg p-1">
                            <button id="btnNivelSimple" onclick="setNivel('estudiante')" class="px-3 py-1 text-[9px] rounded-md bg-cyan-600 text-white transition-all font-bold">SIMPLE</button>
                            <button id="btnNivelSenior" onclick="setNivel('senior')" class="px-3 py-1 text-[9px] rounded-md text-zinc-500 hover:text-white transition-all font-bold ml-1">TÉCNICO</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] text-zinc-500 uppercase tracking-widest block mb-1 font-bold">Motor IA</label>
                            <div class="w-full bg-zinc-900/50 border border-zinc-700 rounded-xl px-2 py-3 text-[10px] text-cyan-400 font-bold flex items-center gap-2">
                                <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(6,182,212,0.8)]"></span>
                                Gemini 2.5
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] text-zinc-500 uppercase tracking-widest block mb-1 font-bold">Lenguaje</label>
                            <select id="selectorLenguaje" class="w-full bg-zinc-900/50 border border-zinc-700 rounded-xl px-2 py-3 text-[10px] focus:outline-none focus:border-cyan-500 text-zinc-300">
                                <option value="javascript">JavaScript</option>
                                <option value="python">Python</option>
                                <option value="sql">SQL</option>
                                <option value="html">HTML/CSS</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1 mt-1">
                        <label class="text-[9px] text-zinc-500 uppercase tracking-widest ml-1 flex justify-between font-bold">
                            Depuración de Código <span class="text-zinc-600 font-normal">(Opcional)</span>
                        </label>
                        <textarea id="codigoError" placeholder="Pega tu código aquí si tienes errores..." class="w-full h-28 bg-zinc-900/50 border border-zinc-700 rounded-xl p-3 text-[10px] font-mono focus:border-cyan-500/50 outline-none resize-none transition-all placeholder:text-zinc-700 text-zinc-300"></textarea>
                    </div>
                </div>

                <button id="btnEscuchar" class="btn-premium w-full py-4 text-black rounded-2xl font-black text-lg active:scale-95 transition-all shadow-xl shadow-cyan-900/20">
                    ANALIZAR / PREGUNTAR
                </button>

                <div id="seccionHistorial" class="mt-2 pt-4 border-t border-white/5 text-left">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[9px] text-zinc-500 uppercase font-bold tracking-tighter">Historial de consultas</p>
                        <button onclick="borrarTodo()" class="text-[9px] text-zinc-600 hover:text-red-400 underline uppercase">Limpiar</button>
                    </div>
                    <div id="listaHistorial" class="flex flex-col gap-2"></div>
                </div>
            </div>

            <div class="md:col-span-8 flex flex-col gap-4">
                <div id="explicacionTexto" class="prose prose-invert prose-sm max-w-none text-left text-zinc-300 leading-relaxed overflow-y-auto max-h-[350px] min-h-[150px] p-6 bg-black/30 rounded-3xl border border-white/5 shadow-inner">
                    Pide ayuda por voz o escribe tu código para comenzar el análisis...
                </div>

                <div id="contenedorCodigo" class="hidden text-left overflow-hidden flex flex-col">
                    <div class="flex justify-between items-center bg-zinc-800/80 px-4 py-2 rounded-t-2xl border-t border-x border-white/10 backdrop-blur-sm">
                        <span class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">Propuesta de Solución</span>
                        <div class="flex gap-2">
                            <button onclick="copiarCodigo()" class="text-[9px] bg-zinc-700 px-3 py-1 rounded hover:bg-cyan-600 transition">Copiar</button>
                        </div>
                    </div>
                    <pre class="!mt-0 !rounded-t-none !rounded-b-2xl !bg-black/60 !p-5 border-b border-x border-white/10 overflow-auto max-h-[350px] shadow-2xl"><code id="codigoVisual" class="text-xs"></code></pre>
                </div>
            </div>
        </div>
    </div>

<script>
    const btn = document.getElementById("btnEscuchar");
    const btnVoz = document.getElementById("toggleVoz");
    const explicacionTexto = document.getElementById("explicacionTexto");
    const codigoVisual = document.getElementById("codigoVisual");
    const listaHistorial = document.getElementById("listaHistorial");

    let resumenPreguntas = JSON.parse(localStorage.getItem('lexi_resumen')) || [];
    let vozActiva = true;
    let nivelActual = 'estudiante';
    let availableVoices = [];

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';

    // MEJORA: Prompts más descriptivos para que no se "entienda nada"
    const prompts = {
        estudiante: "Eres un mentor de programación amable. Explica los conceptos usando viñetas y negritas. Usa un lenguaje sencillo y termina con una analogía creativa.",
        senior: "Eres un Ingeniero de Software Senior. Explica patrones de diseño, eficiencia y mejores prácticas de forma estructurada. Sé técnico y directo."
    };

    window.onload = () => { renderHistorial(); };

    window.speechSynthesis.onvoiceschanged = () => {
        availableVoices = window.speechSynthesis.getVoices();
    };

    function setNivel(nivel) {
        nivelActual = nivel;
        document.getElementById("btnNivelSimple").className = nivel === 'estudiante' ? "px-3 py-1 text-[9px] rounded-md bg-cyan-600 text-white font-bold" : "px-3 py-1 text-[9px] rounded-md text-zinc-500 font-bold";
        document.getElementById("btnNivelSenior").className = nivel === 'senior' ? "px-3 py-1 text-[9px] rounded-md bg-cyan-600 text-white font-bold ml-1" : "px-3 py-1 text-[9px] rounded-md text-zinc-500 font-bold ml-1";
    }

    btnVoz.onclick = () => {
        vozActiva = !vozActiva;
        btnVoz.innerText = vozActiva ? "🔊 VOZ: ON" : "🔇 VOZ: OFF";
        if(!vozActiva) window.speechSynthesis.cancel();
    };

    async function preguntarIA(p) {
        if (!p) return;
        const lenguaje = document.getElementById("selectorLenguaje").value;
        const errorInput = document.getElementById("codigoError").value;
        
        btn.innerHTML = "PENSANDO...";
        btn.disabled = true;
        document.getElementById("statusIcon").classList.add("pulse");

        let instruccionFinal = prompts[nivelActual];
        let preguntaFinal = p;

        if(errorInput.trim() !== "") {
            instruccionFinal = "Eres experto en debugging. Identifica el error, explica por qué sucede y entrega el código corregido.";
            preguntaFinal = `Código (${lenguaje}):\n${errorInput}\n\nConsulta adicional: ${p}`;
        }

        try {
            const response = await fetch('/api/mentor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    pregunta: preguntaFinal,
                    instruccion: instruccionFinal
                })
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error);

            const resText = data.candidates[0].content.parts[0].text;
            
            // PROCESAMIENTO MEJORADO: Separar texto de bloques de código
            if (resText.includes("```")) {
                const partes = resText.split("```");
                explicacionTexto.innerHTML = marked.parse(partes[0]);
                
                document.getElementById("contenedorCodigo").classList.remove("hidden");
                const codigoLimpio = partes[1].replace(/^[a-z]+\n/i, "");
                codigoVisual.textContent = codigoLimpio.trim();
                Prism.highlightElement(codigoVisual);
                hablar(partes[0]);
            } else {
                explicacionTexto.innerHTML = marked.parse(resText);
                document.getElementById("contenedorCodigo").classList.add("hidden");
                hablar(resText);
            }

            if (!resumenPreguntas.includes(p)) {
                resumenPreguntas.unshift(p);
                if(resumenPreguntas.length > 5) resumenPreguntas.pop();
                localStorage.setItem('lexi_resumen', JSON.stringify(resumenPreguntas));
                renderHistorial();
            }

        } catch (e) {
            console.error("Error:", e);
            explicacionTexto.innerHTML = `<span class="text-red-400">Error: ${e.message || "No se pudo obtener respuesta."}</span>`;
        } finally {
            document.getElementById("statusIcon").classList.remove("pulse");
            btn.innerHTML = "ANALIZAR / PREGUNTAR";
            btn.disabled = false;
        }
    }

    function cargarConsulta(index) {
        preguntarIA(resumenPreguntas[index]);
    }

    btn.onclick = () => {
        try {
            recognition.start();
        } catch (e) {
            // Si el reconocimiento falla (ej: sin mic), permitimos escribir en consola o usar el historial
            console.log("Micrófono no activo");
        }
    };
    
    recognition.onresult = (e) => preguntarIA(e.results[0][0].transcript);

    function hablar(texto) {
        if (!vozActiva) return;
        window.speechSynthesis.cancel();
        // Limpiamos el Markdown antes de hablar para que no diga "asterisco asterisco"
        const textoLimpio = texto.replace(/\*|_|#|`|\[|\]/g, "");
        const mensaje = new SpeechSynthesisUtterance(textoLimpio);
        const mejorVoz = availableVoices.find(v => v.lang.includes('es') && v.name.includes('Natural')) || 
                         availableVoices.find(v => v.lang.includes('es'));
        if (mejorVoz) mensaje.voice = mejorVoz;
        mensaje.rate = 0.95; 
        window.speechSynthesis.speak(mensaje);
    }

    function copiarCodigo() {
        navigator.clipboard.writeText(codigoVisual.textContent).then(() => alert("¡Código copiado al portapapeles!"));
    }

    function renderHistorial() {
        listaHistorial.innerHTML = resumenPreguntas.map((q, index) => 
            `<button onclick="cargarConsulta(${index})" class="w-full text-left bg-white/5 p-2 rounded-xl text-[9px] truncate text-zinc-400 border border-white/5 hover:bg-cyan-500/20 hover:text-cyan-300 transition-all">
                ${q}
            </button>`
        ).join('');
    }

    function borrarTodo() { 
        localStorage.clear(); 
        resumenPreguntas = [];
        location.reload(); 
    }
</script>
</body>
</html>
