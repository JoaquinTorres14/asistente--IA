<!DOCTYPE html> 
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiCode AI - Mentor Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        /* Animación para que el icono parezca vivo */
        .pulse-soft {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
            50% { box-shadow: 0 0 30px rgba(6, 182, 212, 0.7); }
        }
    </style>
</head>

<body class="bg-[#020617] text-white flex flex-col items-center justify-center min-h-screen p-4 font-sans overflow-x-hidden">
    
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_top_right,_#1e293b_0%,_#020617_70%)] -z-10"></div>

    <div class="w-full max-w-5xl p-8 glass-card rounded-[2.5rem] shadow-2xl relative mx-4 border border-white/10 backdrop-blur-md">
        
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div id="statusIcon" class="w-12 h-12 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full flex items-center justify-center shadow-lg pulse-soft">
                    <span class="text-2xl">🚀</span>
                </div>
                <div>
                    <h2 class="text-2xl font-black tracking-tighter bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
                        LEXICODE <span class="text-white opacity-90">V2.5</span>
                    </h2>
                    <p class="text-[9px] text-sky-400 font-bold uppercase tracking-[0.2em]">Mentor Pro de Joaquín</p>
                </div>
            </div>
            <button id="toggleVoz" class="text-[10px] px-4 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition font-bold uppercase tracking-widest">
                🔊 VOZ: ON
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            
            <div class="md:col-span-4 flex flex-col gap-4">
                <div class="bg-black/40 p-5 rounded-3xl border border-white/10 flex flex-col gap-4 shadow-inner">
                    
                    <div class="flex items-center justify-between bg-zinc-900/80 p-2 rounded-xl border border-white/5">
                        <span class="text-[9px] text-zinc-400 uppercase font-bold ml-2 tracking-widest">Experiencia</span>
                        <div class="flex bg-zinc-800 rounded-lg p-1">
                            <button id="btnNivelSimple" onclick="setNivel('estudiante')" class="px-3 py-1 text-[9px] rounded-md bg-sky-500 text-white transition-all font-bold">SIMPLE</button>
                            <button id="btnNivelSenior" onclick="setNivel('senior')" class="px-3 py-1 text-[9px] rounded-md text-zinc-500 hover:text-white transition-all font-bold ml-1">TÉCNICO</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] text-zinc-500 uppercase tracking-widest block mb-1 font-bold ml-1">Motor IA</label>
                            <div class="w-full bg-sky-500/10 border border-sky-500/20 rounded-xl px-2 py-3 text-[10px] text-sky-400 font-bold flex items-center gap-2">
                                <span class="w-2 h-2 bg-sky-400 rounded-full animate-pulse"></span>
                                Gemini Flash Lite
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] text-zinc-500 uppercase tracking-widest block mb-1 font-bold ml-1">Lenguaje</label>
                            <select id="selectorLenguaje" class="w-full bg-zinc-900/80 border border-white/10 rounded-xl px-2 py-3 text-[10px] focus:border-sky-500 outline-none text-zinc-300">
                                <option value="javascript">JavaScript</option>
                                <option value="python">Python</option>
                                <option value="sql">SQL</option>
                                <option value="html">HTML/CSS</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] text-zinc-500 uppercase tracking-widest ml-1 font-bold">
                            Depuración de Código
                        </label>
                        <textarea id="codigoError" placeholder="Pega el código con errores aquí..." class="w-full h-24 bg-black/30 border border-white/10 rounded-xl p-3 text-[10px] font-mono focus:border-sky-500/50 outline-none resize-none transition-all placeholder:text-zinc-700"></textarea>
                    </div>
                </div>

                <button id="btnEscuchar" class="w-full py-5 bg-gradient-to-r from-sky-400 to-blue-600 text-slate-900 rounded-2xl font-black text-lg active:scale-95 transition-all shadow-[0_0_20px_rgba(56,189,248,0.4)] hover:shadow-[0_0_30px_rgba(56,189,248,0.6)]">
                    ANALIZAR / PREGUNTAR
                </button>

                <div id="seccionHistorial" class="mt-2 pt-4 border-t border-white/10">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Consultas Recientes</p>
                        <button onclick="borrarTodo()" class="text-[9px] text-zinc-600 hover:text-red-400 underline">Limpiar</button>
                    </div>
                    <div id="listaHistorial" class="flex flex-col gap-2"></div>
                </div>
            </div>

            <div class="md:col-span-8 flex flex-col gap-4">
                <div id="explicacionTexto" class="prose prose-invert prose-sm max-w-none text-left text-slate-300 leading-relaxed overflow-y-auto h-[350px] p-6 bg-black/40 rounded-3xl border border-white/10 shadow-inner custom-scrollbar">
                    Pide ayuda por voz o escribe tu código para comenzar el análisis...
                </div>

                <div class="relative group">
                    <input id="inputManual" type="text" placeholder="Escribe tu duda aquí (Ej: ¿Cómo hago un fetch?)..." 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-5 pr-14 text-sm focus:border-sky-500 outline-none transition-all">
                    <button id="btnEnviarTexto" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-sky-400 hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>

                <div id="contenedorCodigo" class="hidden text-left overflow-hidden flex flex-col">
                    <div class="flex justify-between items-center bg-zinc-800/80 px-4 py-2 rounded-t-2xl border-t border-x border-white/10">
                        <span class="text-[9px] font-bold text-sky-400 uppercase tracking-widest">Código Propuesto</span>
                        <button onclick="copiarCodigo()" class="text-[9px] bg-zinc-700 px-3 py-1 rounded hover:bg-sky-600 transition font-bold">Copiar</button>
                    </div>
                    <pre class="!mt-0 !rounded-t-none !rounded-b-2xl !bg-black/60 !p-5 border-b border-x border-white/10 overflow-auto max-h-[250px]"><code id="codigoVisual" class="text-xs"></code></pre>
                </div>
            </div>
        </div>
    </div>

<script>
    const btn = document.getElementById("btnEscuchar");
    const inputManual = document.getElementById("inputManual");
    const btnEnviarTexto = document.getElementById("btnEnviarTexto");
    const btnVoz = document.getElementById("toggleVoz");
    const explicacionTexto = document.getElementById("explicacionTexto");
    const codigoVisual = document.getElementById("codigoVisual");
    const listaHistorial = document.getElementById("listaHistorial");

    let resumenPreguntas = JSON.parse(localStorage.getItem('lexi_resumen')) || [];
    let vozActiva = true;
    let nivelActual = 'estudiante';

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';

    const prompts = {
        estudiante: "Eres un mentor senior entusiasta. Explica usando viñetas y negritas. Sé breve y muy humano.",
        senior: "Eres un Arquitecto de Software. Sé directo, técnico y enfocado en eficiencia."
    };

    window.onload = () => { renderHistorial(); };

    function setNivel(nivel) {
        nivelActual = nivel;
        document.getElementById("btnNivelSimple").className = nivel === 'estudiante' ? "px-3 py-1 text-[9px] rounded-md bg-sky-500 text-white font-bold" : "px-3 py-1 text-[9px] rounded-md text-zinc-500 font-bold";
        document.getElementById("btnNivelSenior").className = nivel === 'senior' ? "px-3 py-1 text-[9px] rounded-md bg-sky-500 text-white font-bold ml-1" : "px-3 py-1 text-[9px] rounded-md text-zinc-500 font-bold ml-1";
    }

    btnVoz.onclick = () => {
        vozActiva = !vozActiva;
        btnVoz.innerText = vozActiva ? "🔊 VOZ: ON" : "🔇 VOZ: OFF";
        if(!vozActiva) window.speechSynthesis.cancel();
    };

    async function preguntarIA(p) {
        if (!p) return;
        btn.innerHTML = "PENSANDO...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/mentor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: p }) // Sincronizado con tu nuevo mentor.js
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const resText = data.reply;
            
            // Lógica para detectar código en la respuesta
            if (resText.includes("```")) {
                const partes = resText.split("```");
                explicacionTexto.innerHTML = marked.parse(partes[0]);
                document.getElementById("contenedorCodigo").classList.remove("hidden");
                const codigoLimpio = partes[1].replace(/^[a-z]+\n/i, "");
                codigoVisual.textContent = codigoLimpio.trim();
                Prism.highlightElement(codigoVisual);
                hablar(partes[0]);
            } else {
                explicacionTexto.innerHTML = marked.parse(resText);
                document.getElementById("contenedorCodigo").classList.add("hidden");
                hablar(resText);
            }

            // Historial
            if (!resumenPreguntas.includes(p)) {
                resumenPreguntas.unshift(p);
                if(resumenPreguntas.length > 5) resumenPreguntas.pop();
                localStorage.setItem('lexi_resumen', JSON.stringify(resumenPreguntas));
                renderHistorial();
            }

        } catch (e) {
            explicacionTexto.innerHTML = `<span class="text-red-400">Error: ${e.message}</span>`;
        } finally {
            btn.innerHTML = "ANALIZAR / PREGUNTAR";
            btn.disabled = false;
        }
    }

    // Eventos de entrada
    btn.onclick = () => recognition.start();
    btnEnviarTexto.onclick = () => { preguntarIA(inputManual.value); inputManual.value = ""; };
    inputManual.addEventListener('keypress', (e) => { if(e.key === 'Enter') { preguntarIA(inputManual.value); inputManual.value = ""; }});
    recognition.onresult = (e) => preguntarIA(e.results[0][0].transcript);

    function hablar(texto) {
        if(!vozActiva) return;
        const synth = window.speechSynthesis;
        synth.cancel(); 
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.rate = 1.25; // Velocidad mejorada para Gonzalo
        utterance.pitch = 1.1;
        const voices = synth.getVoices();
        const mejorVoz = voices.find(v => v.name.includes('Google') && v.lang.includes('es')) || voices[0];
        if (mejorVoz) utterance.voice = mejorVoz;
        synth.speak(utterance);
    }

    function copiarCodigo() {
        navigator.clipboard.writeText(codigoVisual.textContent).then(() => alert("¡Código copiado!"));
    }

    function renderHistorial() {
        listaHistorial.innerHTML = resumenPreguntas.map((q, index) => 
            `<button onclick="preguntarIA('${q}')" class="w-full text-left bg-white/5 p-2 rounded-xl text-[9px] truncate text-zinc-400 border border-white/5 hover:bg-sky-500/20 hover:text-sky-300 transition-all">
                ${q}
            </button>`
        ).join('');
    }

    function borrarTodo() { 
        localStorage.clear(); 
        resumenPreguntas = [];
        location.reload(); 
    }
</script>
</body>
</html>
